services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-root@vocdoni.io}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - proxy
    restart: ${RESTART:-unless-stopped}
    labels:
      - com.centurylinklabs.watchtower.enable=true

  onchain-census-indexer:
    image: ghcr.io/vocdoni/onchain-census-indexer:${TAG:-latest}
    container_name: onchain-census-indexer
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - proxy
    restart: ${RESTART:-unless-stopped}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.onchain-census-indexer.rule=Host(`${DOMAIN:-indexer.example.com}`)
      - traefik.http.routers.onchain-census-indexer.entrypoints=websecure
      - traefik.http.routers.onchain-census-indexer.service=onchain-census-indexer
      - traefik.http.routers.onchain-census-indexer.tls=true
      - traefik.http.routers.onchain-census-indexer.tls.certresolver=letsencrypt
      - traefik.http.routers.onchain-census-indexer.tls.domains[0].main=${DOMAIN:-indexer.example.com}
      - traefik.http.services.onchain-census-indexer.loadbalancer.server.port=${LISTEN_PORT:-8080}
      - com.centurylinklabs.watchtower.enable=true

  onchain-census-indexer-dev:
    image: ghcr.io/vocdoni/onchain-census-indexer:${TAG:-latest}
    container_name: onchain-census-indexer-dev
    env_file:
      - .env
    environment:
      CONTRACTS: ${DEV_CONTRACTS:-}
      RPCS: ${DEV_RPCS:-}
      DB_PATH: /data
      LISTEN_ADDR: ${DEV_LISTEN_ADDR:-0.0.0.0}
      LISTEN_PORT: ${DEV_LISTEN_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${DEV_CORS_ALLOWED_ORIGINS:-*}
      POLL_INTERVAL: ${DEV_POLL_INTERVAL:-5s}
      CONTRACT_SYNC_INTERVAL: ${DEV_CONTRACT_SYNC_INTERVAL:-1s}
      BATCH_SIZE: ${DEV_BATCH_SIZE:-50}
      VERIFY_BATCH_SIZE: ${DEV_VERIFY_BATCH_SIZE:-0}
      CONFIRMATIONS: ${DEV_CONFIRMATIONS:-12}
      TAIL_RESCAN_DEPTH: ${DEV_TAIL_RESCAN_DEPTH:-0}
      LOG_LEVEL: ${DEV_LOG_LEVEL:-debug}
    volumes:
      - ./data-dev:/data
    networks:
      - proxy
    restart: ${RESTART:-unless-stopped}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.onchain-census-indexer-dev.rule=Host(`${DEV_DOMAIN:-dev.${DOMAIN:-indexer.example.com}}`)
      - traefik.http.routers.onchain-census-indexer-dev.entrypoints=websecure
      - traefik.http.routers.onchain-census-indexer-dev.service=onchain-census-indexer-dev
      - traefik.http.routers.onchain-census-indexer-dev.tls=true
      - traefik.http.routers.onchain-census-indexer-dev.tls.certresolver=letsencrypt
      - traefik.http.routers.onchain-census-indexer-dev.tls.domains[0].main=${DEV_DOMAIN:-dev.${DOMAIN:-indexer.example.com}}
      - traefik.http.services.onchain-census-indexer-dev.loadbalancer.server.port=${DEV_LISTEN_PORT:-8080}
      - com.centurylinklabs.watchtower.enable=false

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    command:
      - --cleanup
      - --label-enable
      - --interval
      - "${WATCHTOWER_INTERVAL:-300}"
      - --include-stopped 
      - --revive-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: ${RESTART:-unless-stopped}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - onchain-census-indexer
      - onchain-census-indexer-dev

networks:
  proxy:
    name: proxy
